############################################################################################################################
#################################################### INFORMATION ###########################################################
############################################################################################################################

# All file paths accept absolute and relative paths
# Environment variables (including ~) are not processed, so don't use them in this config.


############################################################################################################################
############################################ RUN COMMON VARIABLES ##########################################################
############################################################################################################################

# Folder where all the outputs are saved (LD scores, prioritization results files, etc.) 
# CELLECT-LDSC and CELLECT-MAGMA will write the analysis results into <BASE_OUTPUT_DIR>/CELLECT-LDSC and <BASE_OUTPUT_DIR>/CELLECT-MAGMA subdirectories respectively. The directory and its subdirectories will be created if they do not exist.
BASE_OUTPUT_DIR: /home/users/nus/e1124850/scratch/TOngCELLECTGWAS_h2_VAT


### SPECIFICITY_INPUT: list of dictionaries
# id: identifier for the dataset. Output files will be prefixed with the id. MUST be unique and NO double underscores allowed
# path: the path to the matrix containing specificity scores for each genomic region, does not need to be unique
# the files can be uncompressed or compressed (gz/bz2 formats are supported).
SPECIFICITY_INPUT:
  - id: Adipose_VAT
    path: /home/users/nus/e1124850/scratch/cellex_Annotation_level2.VAT_filtered.ensembl.esmu.cellect.csv.gz # this test file contains 5 annotations


### GWAS_SUMSTATS: list of dictionaries
# id: identifier for GWAS. MUST be unique and NO double underscores allowed
# path: filepath for munged GWAS sumstats. Uncompressed / gz or bz2 compressed files allowed.
GWAS_SUMSTATS:
  - id: 2hGlu
    path: /home/users/nus/e1124850/scratch/CELLECT_2hGlu_ldsc.sumstats.gz
  - id: Acute_Pancreatitis
    path: /home/users/nus/e1124850/scratch/CELLECT_Acute_Pancreatitis_ldsc.sumstats.gz
  - id: Adiponectin
    path: /home/users/nus/e1124850/scratch/CELLECT_Adiponectin_ldsc.sumstats.gz
  - id: BMI
    path: /home/users/nus/e1124850/scratch/CELLECT_BMI_ldsc.sumstats.gz
  - id: Body_Weight
    path: /home/users/nus/e1124850/scratch/CELLECT_Body_Weight_ldsc.sumstats.gz
  - id: Chronic_Pancreatitis
    path: /home/users/nus/e1124850/scratch/CELLECT_Chronic_Pancreatitis_ldsc.sumstats.gz
  - id: Coronary_Artery_Disease
    path: /home/users/nus/e1124850/scratch/CELLECT_Coronary_Artery_Disease_ldsc.sumstats.gz
  - id: Diabetic_Nephropathy
    path: /home/users/nus/e1124850/scratch/CELLECT_Diabetic_Nephropathy_ldsc.sumstats.gz
  - id: Fasting_Glucose
    path: /home/users/nus/e1124850/scratch/CELLECT_Fasting_Glucose_ldsc.sumstats.gz
  - id: Fasting_Insulin
    path: /home/users/nus/e1124850/scratch/CELLECT_Fasting_Insulin_ldsc.sumstats.gz
  - id: Glucocorticoids
    path: /home/users/nus/e1124850/scratch/CELLECT_Glucocorticoids_ldsc.sumstats.gz
  - id: Glucose
    path: /home/users/nus/e1124850/scratch/CELLECT_Glucose_ldsc.sumstats.gz
  - id: HbA1c
    path: /home/users/nus/e1124850/scratch/CELLECT_HbA1c_ldsc.sumstats.gz
  - id: HDL
    path: /home/users/nus/e1124850/scratch/CELLECT_HDL_ldsc.sumstats.gz
  - id: Height
    path: /home/users/nus/e1124850/scratch/CELLECT_Height_ldsc.sumstats.gz
  - id: LDL
    path: /home/users/nus/e1124850/scratch/CELLECT_LDL_ldsc.sumstats.gz
  - id: Pancreatic_Cancer
